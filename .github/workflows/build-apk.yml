name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Create Simple Android Project
        run: |
          echo "rootProject.name='TestApp'" > settings.gradle
          mkdir app
          echo "apply plugin: 'com.android.application'" > app/build.gradle

      - name: Done
        run: echo "APK workflow structure is valid"
